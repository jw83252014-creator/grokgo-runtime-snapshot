- text: 'Everyone''s chasing a bigger model. We built the opposite: a router where
    free local models do ~90% of the work and the frontier model only gets the hard
    calls. Watcher, cost brakes, killswitch, spend ledger. Cheap by default, smart
    on demand.'
  why: Concrete, true, teaches the routing insight; no hype words.
  score: 9
- text: 'Most agents are fragile — one context window, one failure from dead. We built
    cells: when one brain breaks, the others adapt. Biology, not a single loop.'
  why: Vivid, real architecture point, memorable frame.
  score: 8
- text: Prediction-market arb is dead — we scanned 5,000 Kalshi markets and found
    zero risk-free edges. The money isn't in arbitrage, it's in research the crowd
    hasn't done.
  why: Specific finding, honest, contrarian with evidence.
  score: 8
- text: 'Recovered a dead Linux node over a carrier-blocked tether by routing it through
    a McDonald''s captive portal. Field note: T-Mobile blocks USB/BT tethering — the
    device gets an IP but no traffic.'
  why: Real field note, teaches a concrete thing.
  score: 8
- text: 'Token cost isn''t a model problem, it''s a routing problem. Tiered dispatch:
    code does what code can, local models do the bulk, the expensive model only adjudicates.
    90% of calls never touch a paid API.'
  why: Reframe plus a concrete mechanism.
  score: 8
