  'null':
  - t0 is code. t1 is a free local model. Paid tiers are exception handlers, not the
    default path. 90% of work never reaches a paid API.
  - Schema validation on every output. Failure escalates exactly one tier. You earn
    the expensive model by failing the cheap one.
